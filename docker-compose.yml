version: "3.9"

services:
  server-dev:
    profiles:
      - dev
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    env_file:
      - ./server/.env.development
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    command: ["/opt/venv/bin/python", "manage.py", "runserver", "0.0.0.0:8000"]

  server-prod:
    profiles:
      - prod
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env.production
    expose:
      - "8000"

  nginx-prod:
    profiles:
      - prod
    image: nginx:1.27-alpine
    depends_on:
      - server-prod
    ports:
      - "8000:80"
    volumes:
      - ./server/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  client-dev:
    profiles:
      - dev
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    env_file:
      - ./client/.env.development
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    command: ["pnpm", "dev", "--host", "0.0.0.0", "--port", "3000"]

  client-prod:
    profiles:
      - prod
    build:
      context: ./client
      dockerfile: Dockerfile
    env_file:
      - ./client/.env.production
    ports:
      - "3000:80"

volumes:
  client_node_modules:
