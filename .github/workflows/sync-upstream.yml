name: Sync Fork From Upstream

on:
  repository_dispatch:
    types: [sync-upstream]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.FORK_SYNC_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Add upstream
        run: git remote add upstream https://github.com/Zeff01/PawmedAI.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Sync upstream changes
        run: |
          git checkout main
          if [ "$(git rev-list HEAD..upstream/main --count)" -gt 0 ]; then
            git merge upstream/main --no-edit
          else
            echo "Fork already up to date"
          fi

      - name: Push changes to fork
        run: git push https://x-access-token:${{ secrets.FORK_SYNC_TOKEN }}@github.com/jpdevdotcom/pawmed-ai-prod.git main

      - name: Get latest tag and bump patch version
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag -l "v*.*.*" | sort -V | tail -n1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v1.0.0"
          else
            MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LATEST | cut -d. -f2)
            PATCH=$(echo $LATEST | cut -d. -f3)
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push https://x-access-token:${{ secrets.FORK_SYNC_TOKEN }}@github.com/jpdevdotcom/pawmed-ai-prod.git ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: "Automated release synced from upstream PawmedAI."
          token: ${{ secrets.FORK_SYNC_TOKEN }}
